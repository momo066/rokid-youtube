name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Android Debug Keystore
      uses: actions/cache@v4
      with:
        path: ~/.android/debug.keystore
        key: android-debug-keystore-${{ runner.os }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Update version in build.gradle
      run: |
        GRADLE_FILE=$(find . -name "build.gradle" | grep "app" | head -n 1)
        [ -z "$GRADLE_FILE" ] && GRADLE_FILE=$(find . -name "build.gradle" | head -n 1)
        if [ -n "$GRADLE_FILE" ]; then
          sed -i -E "s/versionCode[[:space:]]+[0-9]+/versionCode ${{ github.run_number }}/" "$GRADLE_FILE"
          sed -i -E "s/versionName[[:space:]]+\"[^\"]+\"/versionName \"1.0.${{ github.run_number }}\"/" "$GRADLE_FILE"
        fi

    - name: Build with Gradle
      run: |
        GRADLE_DIR=$(dirname $(find . -name "settings.gradle" | head -n 1))
        if [ -z "$GRADLE_DIR" ] || [ "$GRADLE_DIR" = "." ]; then
          gradle assembleDebug
        else
          cd "$GRADLE_DIR"
          gradle assembleDebug
        fi

    - name: Rename and Prepare APK
      run: |
        APK_PATH=$(find . -name "*.apk" | grep debug | head -n 1)
        if [ -n "$APK_PATH" ]; then
          mv "$APK_PATH" ./rokid-app-1.0.${{ github.run_number }}.apk
        else
          echo "APK file not found."
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: rokid-app-apk
        path: ./rokid-app-1.0.${{ github.run_number }}.apk
