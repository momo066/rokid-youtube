name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Android Debug Keystore
      uses: actions/cache@v4
      with:
        path: ~/.android/debug.keystore
        key: android-debug-keystore-${{ runner.os }}

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: |
        ./gradlew assembleDebug -PversionCode=${{ github.run_number }} -PversionName="1.0.${{ github.run_number }}"
        cd app/build/outputs/apk/debug/
        mv app-debug.apk rokid-app-1.0.${{ github.run_number }}.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: rokid-app-apk
        path: app/build/outputs/apk/debug/rokid-app-1.0.${{ github.run_number }}.apk
