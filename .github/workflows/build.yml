name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Android Debug Keystore
      uses: actions/cache@v4
      with:
        path: ~/.android/debug.keystore
        key: android-debug-keystore-${{ runner.os }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build and Rename APK
      run: |
        # Gradleの設定ファイル（settings.gradle または build.gradle）を自動で探して移動
        TARGET_DIR="."
        if [ -n "$(find . -name "settings.gradle" | head -n 1)" ]; then
          TARGET_DIR=$(dirname "$(find . -name "settings.gradle" | head -n 1)")
        elif [ -n "$(find . -name "build.gradle" | head -n 1)" ]; then
          TARGET_DIR=$(dirname "$(find . -name "build.gradle" | head -n 1)")
        else
          echo "Error: Gradle files not found."
          exit 1
        fi
        
        cd "$TARGET_DIR"

        # ビルドの実行
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug -PversionCode=${{ github.run_number }} -PversionName="1.0.${{ github.run_number }}"
        else
          gradle assembleDebug -PversionCode=${{ github.run_number }} -PversionName="1.0.${{ github.run_number }}"
        fi

        # 完成したAPKを探して名前を変更
        cd $GITHUB_WORKSPACE
        APK_PATH=$(find . -name "*.apk" | grep debug | head -n 1)
        if [ -n "$APK_PATH" ]; then
          mv "$APK_PATH" ./rokid-app-1.0.${{ github.run_number }}.apk
        else
          echo "Error: APK file not found."
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: rokid-app-apk
        path: ./rokid-app-1.0.${{ github.run_number }}.apk
