name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Android Debug Keystore
      uses: actions/cache@v4
      with:
        path: ~/.android/debug.keystore
        key: android-debug-keystore-${{ runner.os }}

    - name: Create Android Project Structure
      run: |
        PKG_NAME="com.rokid.youtube"
        if [ -f MainActivity.java ]; then
          PKG_NAME=$(grep -oP '^package\s+\K[a-zA-Z0-9_.]+' MainActivity.java | tr -d ';' || echo "com.rokid.youtube")
        fi
        PKG_DIR=$(echo $PKG_NAME | tr '.' '/')
        
        # 正しいフォルダ構造の作成
        mkdir -p "app/src/main/java/$PKG_DIR"
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/res
        
        # ファイルの移動
        [ -f MainActivity.java ] && mv MainActivity.java "app/src/main/java/$PKG_DIR/"
        [ -f index.html ] && mv index.html app/src/main/assets/
        [ -d res ] && mv res/* app/src/main/res/ 2>/dev/null || true
        
        # AndroidManifest.xmlの生成
        if [ -f "AndroidManifest.xml" ]; then
          mv AndroidManifest.xml app/src/main/
        else
          cat << EOF > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="$PKG_NAME">
            <uses-permission android:name="android.permission.INTERNET" />
            <application
                android:allowBackup="true"
                android:label="Rokid YouTube"
                android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        fi
        
        # 自動更新の仕組みを組み込んだbuild.gradleの生成
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'REPLACE_ME'
            compileSdk 34
            defaultConfig {
                applicationId "REPLACE_ME"
                minSdk 24
                targetSdk 34
                versionCode System.getenv("GITHUB_RUN_NUMBER") ? System.getenv("GITHUB_RUN_NUMBER").toInteger() : 1
                versionName "1.0." + (System.getenv("GITHUB_RUN_NUMBER") ?: "0")
            }
            applicationVariants.all { variant ->
                variant.outputs.all { output ->
                    outputFileName = "RokidYouTube-${variant.versionName}.apk"
                }
            }
        }
        EOF
        
        sed -i "s/REPLACE_ME/$PKG_NAME/g" app/build.gradle
        echo "include ':app'" > settings.gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build with Gradle
      run: gradle :app:assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: rokid-youtube-apk
        path: app/build/outputs/apk/debug/RokidYouTube-1.0.${{ github.run_number }}.apk
